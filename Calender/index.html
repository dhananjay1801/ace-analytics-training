<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calender</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="calender">
            <div class="select-ym">
                <select name="year" id="select-year"></select>
                <select name="month" id="select-month"></select>

                <button id="prev"><i class="fa-solid fa-chevron-left"></i> Previous</button>
                <button id="today">Today</button>
                <button id="next">Next <i class="fa-solid fa-chevron-right"></i></button>
            </div>

            <div class="weekdays">
                <div>Sun</div>
                <div>Mon</div>
                <div>Tue</div>
                <div>Web</div>
                <div>Thu</div>
                <div>Fri</div>
                <div>Sat</div>
            </div>

            <div class="dates">

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

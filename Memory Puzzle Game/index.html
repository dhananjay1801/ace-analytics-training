<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Puzzle Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>

<body>
    <div class="page">
        <div class="title">
            <h1>Memory Puzzle Game</h1>
            <h3>Remember the position of icons</h3>
            <h3 class="result">Time taken: 00:00:00</h3>
        </div>
        <div class="game">
            <div class="rows row-1">
                <div class="boxes box-1"></div>
                <div class="boxes box-2"></div>
                <div class="boxes box-3"></div>
                <div class="boxes box-4"></div>
            </div>
            <div class="rows row-2">
                <div class="boxes box-5"></div>
                <div class="boxes box-6"></div>
                <div class="boxes box-7"></div>
                <div class="boxes box-8"></div>
            </div>
            <div class="rows row-3">
                <div class="boxes box-9"></div>
                <div class="boxes box-10"></div>
                <div class="boxes box-11"></div>
                <div class="boxes box-12"></div>
            </div>
            <div class="rows row-4">
                <div class="boxes box-13"></div>
                <div class="boxes box-14"></div>
                <div class="boxes box-15"></div>
                <div class="boxes box-16"></div>
            </div>
        </div>

        <button class="start-btn">Start New Game</button>
    </div>
    <script src="script.js"></script>
</body>

</html>

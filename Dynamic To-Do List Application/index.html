<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic To-Do List Application</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>Dynamic To-Do List Application</h1>

        <div class="box">
            <div class="todo-input">
                <input type="text" name="todo" id="todo-input" placeholder="What's on your mind today?">
                <button id="save-todo">Save</button>
            </div>

            <div class="seperator"></div>

            <div class="todos">    
            </div>
            
        </div>
    </div>

    <script type="module" src="script.js"></script>
    
</body>
</html>
